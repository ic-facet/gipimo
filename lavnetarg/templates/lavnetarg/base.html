{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}LAVNet-Ar{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'lavnetarg/css/style.css' %}">
    {% block head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="{% url 'lavnetarg:home' %}">
          <img src="{% static 'lavnetarg/images/FACET-Informa-cabecera.png' %}" alt="FACET Informa" height="40" class="d-inline-block align-text-top me-2">
          LAVNet-Ar
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
            
            <li class="nav-link"><a class="nav-link" href="{% url 'lavnetarg:home' %}">Inicio</a></li>
            <li class="nav-link"><a class="nav-link" href="{% url 'lavnetarg:graficas' %}">Gráficas</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'lavnetarg:mapa_solar' %}">Mapa Solar</a></li>
            <!-- Enlace de descarga removido -->
            <li class="nav-item ms-2">
              <img src="{% static 'lavnetarg/images/FACET-logo.jpg' %}" alt="FACET Logo" height="40" class="d-inline-block align-text-top">
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
