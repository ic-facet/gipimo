{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}LAVNet-Zac-Mx{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'lavnetzac/css/style.css' %}">
    <style>
      /* Estilo extra para que el navbar sea coherente con el fondo espacial */
      .navbar-custom {
        background: rgba(255, 255, 255, 0.05) !important;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .navbar-custom .nav-link {
        color: rgba(255, 255, 255, 0.8) !important;
        font-weight: 500;
      }
      .navbar-custom .nav-link:hover {
        color: #00e5ff !important; /* Brillo cian al pasar el mouse */
      }
      .navbar-brand {
        color: white !important;
        font-weight: bold;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="{% url 'lavnetzac:home' %}">
          <img src="{% static 'lavnetzac/images/logo.jpeg' %}" alt="Logo" height="40" class="d-inline-block align-text-top me-2">
          LAVNet-UAZ-Mx
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto align-items-center">
            <a class="nav-link" href="{% url 'lavnetzac:home' %}">Inicio</a>
            <a class="nav-link" href="{% url 'lavnetzac:graficas' %}">Gráficas</a>
            <a class="nav-link" href="{% url 'lavnetzac:mapa_solar' %}">Mapa Solar</a>
            <div class="ms-lg-3">
               <img src="{% static 'lavnetzac/images/logo sociedad adz.jpeg' %}" alt="Logo Sociedad ADZ" height="40" class="d-inline-block align-text-top">
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container mt-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
