services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=lavnet_site.settings
      - DEBUG=False
    volumes:
      - static_volume:/app/staticfiles
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/lavnet-zac/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  static_volume:
